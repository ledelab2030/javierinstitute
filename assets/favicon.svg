<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#05090f"/>
  <!-- Gold rule — journal header -->
  <rect x="0" y="0" width="32" height="2" fill="#c9a84c" opacity="0.7"/>
  <!-- j — warm white -->
  <text x="3" y="24"
    font-family="'Courier New', Courier, monospace"
    font-size="21"
    font-weight="500"
    fill="#e4ddd0">j</text>
  <!-- A — gold -->
  <text x="15" y="24"
    font-family="'Courier New', Courier, monospace"
    font-size="21"
    font-weight="500"
    fill="#c9a84c">A</text>
</svg>
